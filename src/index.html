<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <title>Ashif Saheer T | Backend Engineer</title>
    <meta name="description" content="Portfolio of Ashif Saheer T, Backend Engineer specializing in scalable enterprise systems and microservices." />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
      #global-loader {
        position: fixed; inset: 0; z-index: 99999;
        background: #09090b; display: flex; align-items: center; justify-content: center;
        transition: opacity 0.8s ease-out;
        font-family: 'Space Mono', monospace;
        color: #10b981;
      }
      .loader-text {
        font-size: 14px;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink { 50% { opacity: 0; } }
    </style>
  </head>
  <body>
    <!-- Initial Splash Loader -->
    <div id="global-loader"><div class="loader-text">[ INITIALIZING_SYSTEM ]</div></div>

    <app-root></app-root>

    <!-- Clear loader after App finishes spinning up -->
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('global-loader');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 800);
          }
        }, 1000);
      });
    </script>
  </body>
</html>
