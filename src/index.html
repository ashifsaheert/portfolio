<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <title>Ashif Saheer | Portfolio</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      #global-loader {
        position: fixed; inset: 0; z-index: 99999;
        background: #0f172a; display: flex; align-items: center; justify-content: center;
        transition: opacity 0.8s ease-out;
      }
      .loader-circle {
        width: 60px; height: 60px; border: 4px solid rgba(6,182,212,0.2); 
        border-top-color: #06b6d4; border-radius: 50%;
        animation: spin 1s linear infinite, glow 2s ease-in-out infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes glow { 50% { box-shadow: 0 0 20px rgba(6,182,212,0.6); } }
    </style>
  </head>
  <body>
    <!-- Initial Splash Loader -->
    <div id="global-loader"><div class="loader-circle"></div></div>

    <app-root></app-root>

    <!-- Clear loader after App finishes spinning up -->
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('global-loader');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 800);
          }
        }, 1000);
      });
    </script>
  </body>
</html>
