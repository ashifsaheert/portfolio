<section class="py-24 md:py-32 relative border-t border-slate-200 dark:border-zinc-800">
  <div class="max-w-7xl mx-auto px-6 lg:px-8 relative z-10">

    <div class="mb-20" appScrollReveal="reveal-up">
      <h2 class="text-4xl md:text-6xl font-black text-slate-900 dark:text-slate-100 uppercase tracking-tighter">
        Technical <span class="text-accent">Toolkit.</span>
      </h2>
    </div>

    <!-- Asymmetric / Notes-like Layout (De-optimized) -->
    <div class="flex flex-col md:flex-row flex-wrap gap-x-16 gap-y-20 items-start">

      <!-- Core Engineering -->
      <div class="flex flex-col gap-6" style="flex: 1 1 300px;" appScrollReveal="reveal-left">
        <h3
          class="font-mono text-sm tracking-widest text-slate-900 dark:text-slate-100 border-b-2 border-slate-900 dark:border-white pb-3 font-bold uppercase">
          {{ dataService.skills.core.title }}
        </h3>
        <div class="text-slate-800 dark:text-slate-200 font-medium space-y-6 font-mono text-sm md:text-base mt-2">
          <div class="flex items-start" *ngFor="let item of dataService.skills.core.items">
            <span class="text-accent mr-3 mt-1 text-xs">/</span>
            <div>
              <span class="block text-xl font-black font-sans uppercase tracking-tight">{{ item.name }}</span>
              <span class="text-slate-500 dark:text-zinc-500 text-[11px] uppercase tracking-widest">{{ item.level
                }}</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Architecture & Integration -->
      <div class="flex flex-col gap-5 lg:mt-12" style="flex: 1 1 250px;" appScrollReveal="reveal-up">
        <h3
          class="font-mono text-[13px] lowercase tracking-widest text-slate-500 dark:text-zinc-500 border-b border-dashed border-slate-300 dark:border-zinc-700 pb-2">
          {{ dataService.skills.architecture.title }}
        </h3>
        <ul class="text-slate-800 dark:text-slate-200 font-medium space-y-4 font-mono text-[15px] pt-2">
          <li *ngFor="let item of dataService.skills.architecture.items"><span
              class="text-accent opacity-80 mr-2">></span> {{ item.name }}</li>
        </ul>
      </div>

      <!-- Data & Queues -->
      <div class="flex flex-col gap-6" style="flex: 1 1 350px;" appScrollReveal="reveal-right">
        <h3
          class="font-mono text-sm tracking-widest text-slate-700 dark:text-slate-300 border-b border-slate-300 dark:border-zinc-700 pb-2">
          {{ dataService.skills.data.title }}
        </h3>
        <div class="flex flex-wrap gap-4 font-mono text-sm text-slate-800 dark:text-slate-200 pt-2">
          <ng-container *ngFor="let item of dataService.skills.data.items">
            <span *ngIf="item.name === 'Kafka'"
              class="border-2 border-slate-900 dark:border-white px-3 py-1.5 font-bold">{{ item.name }}</span>
            <span *ngIf="item.name !== 'Kafka'"
              class="border border-slate-200 dark:border-zinc-800 px-3 py-1.5 shadow-sm">{{ item.name }}</span>
          </ng-container>
        </div>
      </div>

      <!-- DevOps & Infrastructure -->
      <div class="flex flex-col gap-6 md:mt-8 lg:mt-0" style="flex: 1 1 200px;" appScrollReveal="reveal-up">
        <h3
          class="font-mono text-[11px] uppercase tracking-widest text-slate-400 dark:text-zinc-600 border-b-4 border-slate-200 dark:border-zinc-800 pb-1">
          {{ dataService.skills.devops.title }}
        </h3>
        <ul class="text-slate-700 dark:text-slate-300 font-medium space-y-3 font-mono text-sm pt-2 ml-2">
          <li *ngFor="let item of dataService.skills.devops.items"><span class="text-accent opacity-50 mr-2">+</span> {{item.name }}</li>
        </ul>
      </div>

    </div>
  </div>
</section>
