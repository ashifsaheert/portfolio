<section class="py-24 md:py-32 relative border-t border-slate-200 dark:border-zinc-800">
  <div class="max-w-6xl mx-auto px-6 lg:px-8 relative z-10">
    <div class="mb-20" appScrollReveal="reveal-up">
      <h2 class="text-4xl md:text-6xl font-black text-slate-900 dark:text-slate-100 uppercase tracking-tighter">
        Let's <span class="text-accent">Connect.</span>
      </h2>
      <p class="text-slate-700 dark:text-zinc-300 mt-6 max-w-xl text-lg md:text-xl font-serif leading-relaxed">
        If you want to build something or just talk tech, feel free to reach out.
      </p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-5 gap-16 lg:gap-24">
      
      <!-- Contact Info -->
      <div class="lg:col-span-2 space-y-12 lg:pt-4" appScrollReveal="reveal-left">
        
        <div class="space-y-10 font-mono text-sm md:text-base">
          <div class="flex items-start gap-4">
            <span class="text-accent mt-1 opacity-50">></span>
            <div>
              <p class="text-slate-400 dark:text-zinc-500 text-[11px] uppercase tracking-widest mb-1">Email</p>
              <a href="mailto:ashifsaheer2000@gmail.com" class="text-slate-900 dark:text-slate-100 hover:text-accent dark:hover:text-accent transition-colors font-bold break-all border-b border-transparent hover:border-accent">ashifsaheer2000@gmail.com</a>
            </div>
          </div>

          <div class="flex items-start gap-4">
            <span class="text-accent mt-1 opacity-50">></span>
            <div>
              <p class="text-slate-400 dark:text-zinc-500 text-[11px] uppercase tracking-widest mb-1">Phone</p>
              <a href="tel:+918086755837" class="text-slate-900 dark:text-slate-100 hover:text-accent dark:hover:text-accent transition-colors font-bold border-b border-transparent hover:border-accent">+91 8086755837</a>
            </div>
          </div>

          <div class="flex items-start gap-4">
            <span class="text-accent mt-1 opacity-50">></span>
            <div>
              <p class="text-slate-400 dark:text-zinc-500 text-[11px] uppercase tracking-widest mb-1">Location</p>
              <p class="text-slate-900 dark:text-slate-100 font-bold">Malappuram, Kerala, India</p>
            </div>
          </div>
        </div>

        <!-- Social Links -->
        <div class="pt-10 border-t border-dashed border-slate-300 dark:border-zinc-800">
          <p class="text-[10px] font-mono text-slate-400 dark:text-zinc-500 mb-6 uppercase tracking-widest">Network_</p>
          <div class="flex flex-col gap-4 font-mono text-[13px] uppercase tracking-widest font-bold">
            <a href="https://linkedin.com/in/ashif-saheer-t-114b58194" target="_blank" class="text-slate-800 dark:text-slate-200 hover:text-accent transition-colors duration-300 w-max border-b border-slate-300 dark:border-zinc-700 hover:border-accent pb-1">
              LinkedIn
            </a>
            <a href="#" class="text-slate-800 dark:text-slate-200 hover:text-accent transition-colors duration-300 w-max border-b border-slate-300 dark:border-zinc-700 hover:border-accent pb-1">
              GitHub
            </a>
          </div>
        </div>
      </div>

      <!-- Contact Form (De-optimized: Removed card wrapper) -->
      <div class="lg:col-span-3 pt-4 lg:pt-0" appScrollReveal="reveal-right">
        
        <!-- Alerts -->
        <div *ngIf="successMessage" class="mb-10 p-4 border-l-4 border-slate-500 bg-slate-500/5 text-slate-700 dark:text-slate-400 font-mono text-sm flex items-start gap-3">
          <span class="text-slate-500">[OK]</span> {{ successMessage }}
        </div>
        <div *ngIf="errorMessage" class="mb-10 p-4 border-l-4 border-red-500 bg-red-500/5 text-red-700 dark:text-red-400 font-mono text-sm flex items-start gap-3">
          <span class="text-red-500">[ERR]</span> {{ errorMessage }}
        </div>

        <form class="space-y-10" (submit)="onSubmit($event)">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-10 font-mono text-sm">
            <!-- Name Input -->
            <div class="flex flex-col">
              <label for="name" class="text-slate-500 dark:text-zinc-500 uppercase tracking-widest mb-3 text-xs">Name *</label>
              <input type="text" id="name" name="name" [(ngModel)]="formData.name" required
                     class="w-full bg-transparent border-b border-slate-400 dark:border-zinc-600 px-0 py-2 text-slate-900 dark:text-slate-100 focus:outline-none focus:border-accent transition-colors">
            </div>
            
            <!-- Email Input -->
            <div class="flex flex-col">
              <label for="email" class="text-slate-500 dark:text-zinc-500 uppercase tracking-widest mb-3 text-xs">Email *</label>
              <input type="email" id="email" name="email" [(ngModel)]="formData.email" required
                     class="w-full bg-transparent border-b-[1.5px] border-slate-400 dark:border-zinc-600 px-0 py-2 text-slate-900 dark:text-slate-100 focus:outline-none focus:border-accent transition-colors">
            </div>
          </div>
          
          <!-- Subject Input -->
          <div class="flex flex-col font-mono text-sm">
            <label for="subject" class="text-slate-500 dark:text-zinc-500 uppercase tracking-widest mb-3 text-xs">Subject</label>
            <input type="text" id="subject" name="subject" [(ngModel)]="formData.subject"
                   class="w-full bg-transparent border-b border-slate-400 dark:border-zinc-600 px-0 py-2 text-slate-900 dark:text-slate-100 focus:outline-none focus:border-accent transition-colors">
          </div>

          <!-- Message Input -->
          <div class="flex flex-col font-mono text-sm pt-4">
            <label for="message" class="text-slate-500 dark:text-zinc-500 uppercase tracking-widest mb-3 text-xs">Message *</label>
            <textarea id="message" name="message" [(ngModel)]="formData.message" rows="5" required
                      class="w-full bg-transparent border border-slate-300 dark:border-zinc-700 p-4 text-slate-900 dark:text-slate-100 focus:outline-none focus:border-accent transition-colors resize-y leading-relaxed"></textarea>
          </div>

          <!-- Submit Button (Misaligned padding) -->
          <button type="submit" [disabled]="isSubmitting"
                  class="mt-8 px-10 pt-4 pb-3 bg-slate-900 dark:bg-slate-100 text-slate-100 dark:text-slate-900 font-bold uppercase tracking-widest text-xs hover:bg-accent dark:hover:bg-accent hover:text-white dark:hover:text-white transition-all duration-300 disabled:opacity-50 inline-flex items-center gap-3">
            <ng-container *ngIf="!isSubmitting">
              Transmit <span class="text-slate-500 dark:text-slate-400 ml-2">→</span>
            </ng-container>
            <ng-container *ngIf="isSubmitting">
              <span class="animate-pulse">Transmitting...</span>
            </ng-container>
          </button>
          
        </form>
      </div>

    </div>
  </div>
</section>
