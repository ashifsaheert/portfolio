<section class="py-24 md:py-32 relative border-t border-slate-200 dark:border-zinc-800">
  <div class="max-w-5xl mx-auto px-6 lg:px-8">
    
    <div class="mb-20" appScrollReveal="reveal-up">
      <h2 class="text-4xl md:text-6xl font-black text-slate-900 dark:text-slate-100 uppercase tracking-tighter">
        Professional <span class="text-accent">Path.</span>
      </h2>
    </div>

    <!-- Raw Typographic Timeline (De-optimized) -->
    <div class="relative space-y-28 pb-8">
      <!-- Experience Items -->
      <div *ngFor="let exp of dataService.experience; let i = index" class="relative group" [ngClass]="{'ml-0 md:ml-4': i % 2 === 0, 'ml-4 md:ml-16': i % 2 !== 0}" appScrollReveal="reveal-up">
        <!-- Abstract timeline marker -->
        <div class="hidden md:block absolute w-[2px] bg-slate-200 dark:bg-zinc-800 -left-6 top-8" [ngClass]="{'h-full': i % 2 === 0, 'h-32': i % 2 !== 0}"></div>
        <div class="absolute w-3 h-3 bg-accent rounded-none -left-[27px] top-4 hidden md:block z-10 opacity-80"></div>
        
        <div>
          <div class="flex flex-col md:flex-row md:items-start justify-between mb-8 gap-4">
            <div>
              <h3 class="font-black text-slate-900 dark:text-white uppercase tracking-tight" [ngClass]="{'text-3xl md:text-4xl': i % 2 === 0, 'text-2xl md:text-3xl': i % 2 !== 0}">{{ exp.role }}</h3>
              <p class="text-slate-600 dark:text-zinc-400 font-mono text-sm md:text-base mt-2 tracking-widest uppercase">{{ exp.company }}</p>
            </div>
            <div class="inline-flex self-start md:self-auto text-[11px] font-mono font-bold text-slate-500 dark:text-zinc-500 tracking-widest border border-slate-300 dark:border-zinc-700 px-3 py-1 bg-slate-50 dark:bg-zinc-900">
              {{ exp.duration }}
            </div>
          </div>
          
          <ul class="space-y-6 text-slate-700 dark:text-zinc-300 text-base md:text-lg leading-relaxed font-serif pl-0 md:pl-2">
            <li class="flex items-start gap-4" *ngFor="let detail of exp.details">
              <span class="text-accent font-mono text-sm mt-1" [ngClass]="{'opacity-50': i % 2 === 0, 'opacity-80': i % 2 !== 0}">{{ i % 2 === 0 ? '+' : '>' }}</span>
              <p>
                <strong *ngIf="detail.title" class="text-slate-900 dark:text-white font-sans uppercase text-xs tracking-widest border-b border-slate-300 dark:border-zinc-700 pb-0.5">{{ detail.title }}</strong><br *ngIf="detail.title"/>
                {{ detail.description }}
              </p>
            </li>
          </ul>
        </div>
      </div>

    </div>
  </div>
</section>
